<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>연구실 장부</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;min-height:100vh}
input{width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:#111;outline:none}
input:focus{border-color:#888}
button{font-family:inherit;cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwbQwnwCm3sdFI4WdflMy-KrcWLsLxmLNpw1Ag_GemBxO1IjIxuusrusZfwH4B9NsQ/exec';
const BASELINE = 50000;
const fmt = n => new Intl.NumberFormat('ko-KR').format(Math.round(n));
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);

async function loadData(){
  const r=await fetch(SCRIPT_URL);
  const data=await r.json();
  const members=(data.members||[]).map(m=>({...m,balance:Number(m.balance)||0}));
  const transactions=(data.transactions||[]).map(t=>({
    ...t,
    amount:Number(t.amount)||0,
    amountPerPerson:Number(t.amountPerPerson)||0,
    memberIds:t.memberIds?String(t.memberIds).split(',').filter(Boolean):[],
    changes:[]
  }));
  return{members,transactions};
}

async function saveData(members,transactions){
  await fetch(SCRIPT_URL,{
    method:'POST',mode:'no-cors',
    body:JSON.stringify({action:'saveAll',members,transactions})
  });
}

function Spinner(){
  return <span style={{display:'inline-block',width:15,height:15,border:'2px solid #ddd',borderTopColor:'#555',borderRadius:'50%',animation:'spin .6s linear infinite'}}/>
}

function Avatar({name,size=36}){
  const cols=[['#dbeafe','#1d4ed8'],['#dcfce7','#15803d'],['#fef3c7','#92400e'],['#fce7f3','#9d174d'],['#d1fae5','#065f46'],['#ede9fe','#5b21b6']];
  const [bg,fg]=cols[name.charCodeAt(0)%cols.length];
  return <div style={{width:size,height:size,borderRadius:'50%',background:bg,color:fg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.38,fontWeight:600,flexShrink:0}}>{name.slice(0,1)}</div>;
}

function Chip({active,onClick,children}){
  return <button onClick={onClick} style={{padding:'7px 15px',border:active?'2px solid #111':'1px solid #ddd',borderRadius:20,background:active?'#111':'#fff',color:active?'#fff':'#111',fontSize:13,fontWeight:active?500:400,transition:'all .15s'}}>{children}</button>;
}

function HomeTab({members}){
  const below=members.filter(m=>m.balance<BASELINE);
  const total=members.reduce((s,m)=>s+m.balance,0);
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:24}}>
        <div style={{background:'#fff',borderRadius:12,padding:'16px 14px',border:'1px solid #eee'}}>
          <div style={{fontSize:11,color:'#999',marginBottom:6,fontWeight:500,letterSpacing:.5}}>전체 잔액</div>
          <div style={{fontSize:22,fontWeight:600}}>{fmt(total)}원</div>
        </div>
        <div style={{background:'#fff',borderRadius:12,padding:'16px 14px',border:'1px solid #eee'}}>
          <div style={{fontSize:11,color:'#999',marginBottom:6,fontWeight:500,letterSpacing:.5}}>기준 미달</div>
          <div style={{fontSize:22,fontWeight:600,color:below.length>0?'#dc2626':'#16a34a'}}>{below.length}명</div>
        </div>
      </div>
      <div style={{fontSize:12,color:'#999',marginBottom:10,fontWeight:600,letterSpacing:.5}}>개인별 잔액</div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {[...members].sort((a,b)=>a.balance-b.balance).map(m=>{
          const diff=m.balance-BASELINE;
          const low=diff<0;
          const pct=Math.min(100,Math.max(0,(m.balance/BASELINE)*100));
          return(
            <div key={m.id} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 14px',borderRadius:12,border:'1px solid #eee',background:'#fff'}}>
              <Avatar name={m.name}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                  <span style={{fontWeight:600,fontSize:14}}>{m.name}</span>
                  <span style={{fontSize:15,fontWeight:600,color:low?'#dc2626':'#111'}}>{fmt(m.balance)}원</span>
                </div>
                <div style={{height:5,borderRadius:3,background:'#f0f0f0',overflow:'hidden'}}>
                  <div style={{height:'100%',width:pct+'%',borderRadius:3,background:low?'#fca5a5':'#86efac',transition:'width .4s'}}/>
                </div>
                <div style={{fontSize:11,color:low?'#dc2626':'#999',marginTop:4}}>{low?`${fmt(-diff)}원 부족`:`기준 초과 +${fmt(diff)}원`}</div>
              </div>
            </div>
          );
        })}
      </div>
      {below.length>0&&(
        <div style={{marginTop:24}}>
          <div style={{fontSize:12,color:'#999',marginBottom:10,fontWeight:600,letterSpacing:.5}}>이번 달 정산 필요</div>
          <div style={{borderRadius:12,border:'1px solid #fecaca',overflow:'hidden',background:'#fff'}}>
            {below.map((m,i)=>(
              <div key={m.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom:i<below.length-1?'1px solid #f5f5f5':'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}><Avatar name={m.name} size={28}/><span style={{fontSize:14,fontWeight:500}}>{m.name}</span></div>
                <span style={{fontSize:14,fontWeight:600,color:'#dc2626'}}>+{fmt(BASELINE-m.balance)}원</span>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{textAlign:'center',fontSize:11,color:'#bbb',marginTop:20}}>기준금액 {fmt(BASELINE)}원/월</div>
    </div>
  );
}

function TxnTab({members,transactions,onUpdate,saving}){
  const [type,setType]=useState('shared');
  const [selMember,setSelMember]=useState('');
  const [selMembers,setSelMembers]=useState([]);
  const [amount,setAmount]=useState('');
  const [memo,setMemo]=useState('');
  const [done,setDone]=useState(false);
  const toggleM=id=>setSelMembers(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const allSel=selMembers.length===members.length;
  const amtNum=parseInt(amount.replace(/[^0-9]/g,''))||0;
  const perPerson=type==='shared'&&selMembers.length>1?amtNum/selMembers.length:0;

  const handleSubmit=async()=>{
    if(amtNum<=0)return;
    let newMembers,txn;
    if(type==='shared'){
      const ids=selMembers.length>0?selMembers:members.map(m=>m.id);
      const per=amtNum/ids.length;
      const changes=ids.map(id=>({memberId:id,delta:-per}));
      newMembers=members.map(m=>{const c=changes.find(x=>x.memberId===m.id);return c?{...m,balance:m.balance+c.delta}:m;});
      txn={id:uid(),date:new Date().toISOString(),type:'shared',amount:amtNum,memo,memberId:'',memberIds:ids,amountPerPerson:per,changes};
    }else{
      if(!selMember)return;
      const delta=type==='deposit'?amtNum:-amtNum;
      newMembers=members.map(m=>m.id===selMember?{...m,balance:m.balance+delta}:m);
      txn={id:uid(),date:new Date().toISOString(),type,amount:amtNum,memo,memberId:selMember,memberIds:[],amountPerPerson:0,changes:[{memberId:selMember,delta}]};
    }
    await onUpdate(newMembers,[txn,...transactions]);
    setAmount('');setMemo('');setSelMember('');setSelMembers([]);
    setDone(true);setTimeout(()=>setDone(false),2000);
  };

  return(
    <div>
      <div style={{display:'flex',gap:8,marginBottom:22,flexWrap:'wrap'}}>
        {[['deposit','입금'],['withdraw','출금'],['shared','공동지출']].map(([v,l])=>(
          <Chip key={v} active={type===v} onClick={()=>setType(v)}>{l}</Chip>
        ))}
      </div>
      <div style={{marginBottom:18}}>
        <div style={{fontSize:12,color:'#999',marginBottom:9,fontWeight:500}}>{type==='shared'?'참여 멤버 (미선택시 전체)':'대상 멤버'}</div>
        {type==='shared'?(
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {members.map(m=><Chip key={m.id} active={selMembers.includes(m.id)} onClick={()=>toggleM(m.id)}>{m.name}</Chip>)}
            <button onClick={()=>setSelMembers(allSel?[]:members.map(m=>m.id))} style={{padding:'7px 15px',border:'1px solid #ddd',borderRadius:20,background:'#fff',color:'#999',fontSize:13}}>{allSel?'전체 해제':'전체'}</button>
          </div>
        ):(
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {members.map(m=><Chip key={m.id} active={selMember===m.id} onClick={()=>setSelMember(m.id)}>{m.name}</Chip>)}
          </div>
        )}
      </div>
      <div style={{marginBottom:18}}>
        <div style={{fontSize:12,color:'#999',marginBottom:9,fontWeight:500}}>금액</div>
        <div style={{position:'relative'}}>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0" min="0" style={{paddingRight:32,fontSize:20,fontWeight:600}}/>
          <span style={{position:'absolute',right:13,top:'50%',transform:'translateY(-50%)',color:'#999',fontSize:14,pointerEvents:'none'}}>원</span>
        </div>
        {perPerson>0&&<div style={{fontSize:12,color:'#999',marginTop:5}}>1인당 {fmt(perPerson)}원 ({selMembers.length}명 분배)</div>}
      </div>
      <div style={{marginBottom:22}}>
        <div style={{fontSize:12,color:'#999',marginBottom:9,fontWeight:500}}>메모 (선택)</div>
        <input type="text" value={memo} onChange={e=>setMemo(e.target.value)} placeholder="배달음식, 간식비 등..."/>
      </div>
      <button onClick={handleSubmit} disabled={saving} style={{width:'100%',padding:'14px',border:'none',borderRadius:12,background:done?'#dcfce7':saving?'#f5f5f5':'#111',color:done?'#16a34a':saving?'#999':'#fff',fontSize:16,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8,transition:'all .2s'}}>
        {saving?<><Spinner/>&nbsp;저장 중...</>:done?'✓ 저장됨':'거래 저장'}
      </button>
    </div>
  );
}

function HistoryTab({members,transactions,onUpdate,saving}){
  const byId=members.reduce((a,m)=>({...a,[m.id]:m}),{});
  const [filter,setFilter]=useState('all');
  const getInfo=txn=>{
    if(txn.type==='deposit') return{label:(byId[txn.memberId]?.name||'?')+' 입금',icon:'+',bg:'#dcfce7',tc:'#16a34a',sign:'+'};
    if(txn.type==='withdraw') return{label:(byId[txn.memberId]?.name||'?')+' 출금',icon:'−',bg:'#fee2e2',tc:'#dc2626',sign:'−'};
    const names=(txn.memberIds||[]).map(id=>byId[id]?.name).filter(Boolean);
    return{label:`공동지출 · ${names.join(', ')}`,icon:'÷',bg:'#dbeafe',tc:'#dc2626',sign:'−'};
  };
  const handleDelete=async id=>{
    const txn=transactions.find(t=>t.id===id);if(!txn)return;
    const newM=members.map(m=>{const c=(txn.changes||[]).find(x=>x.memberId===m.id);return c?{...m,balance:m.balance-c.delta}:m;});
    await onUpdate(newM,transactions.filter(t=>t.id!==id));
  };
  const filtered=filter==='all'?transactions:transactions.filter(t=>filter==='shared'?t.type==='shared':t.type===filter);
  return(
    <div>
      <div style={{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap'}}>
        {[['all','전체'],['deposit','입금'],['withdraw','출금'],['shared','공동']].map(([v,l])=>(
          <Chip key={v} active={filter===v} onClick={()=>setFilter(v)}>{l}</Chip>
        ))}
      </div>
      {filtered.length===0?(
        <div style={{textAlign:'center',color:'#bbb',padding:'4rem 0',fontSize:15}}>거래 내역이 없습니다</div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {filtered.map(txn=>{
            const{label,icon,bg,tc,sign}=getInfo(txn);
            const date=new Date(txn.date).toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
            return(
              <div key={txn.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderRadius:12,border:'1px solid #eee',background:'#fff'}}>
                <div style={{width:36,height:36,borderRadius:10,background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0,color:tc,fontWeight:600}}>{icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{txn.memo||label}</div>
                  <div style={{fontSize:11,color:'#999',marginTop:2}}>{txn.memo?label+' · ':''}{date}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0,marginRight:6}}>
                  <div style={{fontSize:14,fontWeight:600,color:tc}}>{sign}{fmt(txn.amount)}원</div>
                  {txn.type==='shared'&&(txn.memberIds||[]).length>1&&<div style={{fontSize:11,color:'#999'}}>{fmt(txn.amountPerPerson)}원/인</div>}
                </div>
                <button onClick={()=>handleDelete(txn.id)} disabled={saving} style={{background:'transparent',border:'none',color:'#ccc',fontSize:20,padding:'2px 4px',lineHeight:1}}>×</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function MembersTab({members,transactions,onUpdate,saving}){
  const [name,setName]=useState('');
  const [bal,setBal]=useState('50000');
  const [editId,setEditId]=useState(null);
  const [editBal,setEditBal]=useState('');
  const add=async()=>{
    if(!name.trim())return;
    await onUpdate([...members,{id:uid(),name:name.trim(),balance:parseInt(bal)||0}],transactions);
    setName('');setBal('50000');
  };
  const remove=async id=>await onUpdate(members.filter(m=>m.id!==id),transactions);
  const saveEdit=async id=>{
    await onUpdate(members.map(m=>m.id===id?{...m,balance:parseInt(editBal)||0}:m),transactions);
    setEditId(null);
  };
  return(
    <div>
      <div style={{marginBottom:22,padding:16,border:'1px solid #eee',borderRadius:12,background:'#fff'}}>
        <div style={{fontSize:12,color:'#999',marginBottom:12,fontWeight:600,letterSpacing:.5}}>멤버 추가</div>
        <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="이름" style={{marginBottom:10}} onKeyDown={e=>e.key==='Enter'&&add()}/>
        <input type="number" value={bal} onChange={e=>setBal(e.target.value)} placeholder="초기 잔액" style={{marginBottom:14}}/>
        <button onClick={add} disabled={saving} style={{width:'100%',padding:'11px',border:'none',borderRadius:10,background:'#111',color:'#fff',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          {saving?<><Spinner/>&nbsp;저장 중...</>:'추가'}
        </button>
      </div>
      <div style={{fontSize:12,color:'#999',marginBottom:10,fontWeight:600,letterSpacing:.5}}>멤버 목록 ({members.length}명)</div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {members.map(m=>(
          <div key={m.id} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 14px',borderRadius:12,border:'1px solid #eee',background:'#fff'}}>
            <Avatar name={m.name}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14}}>{m.name}</div>
              {editId===m.id?(
                <div style={{display:'flex',gap:6,marginTop:6}}>
                  <input type="number" value={editBal} onChange={e=>setEditBal(e.target.value)} style={{fontSize:13,padding:'5px 9px',width:120}}/>
                  <button onClick={()=>saveEdit(m.id)} style={{padding:'5px 11px',border:'1px solid #ddd',borderRadius:7,background:'#fff',fontSize:12,fontWeight:500}}>저장</button>
                  <button onClick={()=>setEditId(null)} style={{padding:'5px 8px',border:'none',background:'transparent',fontSize:12,color:'#999'}}>취소</button>
                </div>
              ):(
                <div style={{fontSize:13,color:'#999',marginTop:2,cursor:'pointer'}} onClick={()=>{setEditId(m.id);setEditBal(String(m.balance));}}>{fmt(m.balance)}원 <span style={{fontSize:11}}>✎</span></div>
              )}
            </div>
            <button onClick={()=>remove(m.id)} disabled={saving} style={{padding:'5px 12px',border:'1px solid #fee2e2',borderRadius:8,background:'#fff',color:'#dc2626',fontSize:12,fontWeight:500}}>삭제</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const [members,setMembers]=useState([]);
  const [transactions,setTxns]=useState([]);
  const [tab,setTab]=useState('home');
  const [status,setStatus]=useState('loading');
  const [errMsg,setErrMsg]=useState('');

  const load=useCallback(async()=>{
    setStatus('loading');
    try{const d=await loadData();setMembers(d.members);setTxns(d.transactions);setStatus('ok');}
    catch(e){setStatus('error');setErrMsg(e.message||'연결 실패');}
  },[]);

  useEffect(()=>{load();},[load]);

  const handleUpdate=useCallback(async(newM,newT)=>{
    setMembers(newM);setTxns(newT);setStatus('saving');
    try{await saveData(newM,newT);setStatus('ok');}
    catch{setStatus('error');setErrMsg('저장 실패');}
  },[]);

  const tabs=[{id:'home',label:'잔액현황'},{id:'txn',label:'거래입력'},{id:'history',label:'거래내역'},{id:'members',label:'멤버관리'}];

  return(
    <div style={{maxWidth:540,margin:'0 auto',padding:'0 16px 80px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 0 16px'}}>
        <div>
          <div style={{fontSize:20,fontWeight:700}}>연구실 장부</div>
          <div style={{fontSize:11,color:status==='error'?'#dc2626':'#bbb',marginTop:2}}>
            {status==='loading'&&'불러오는 중...'}
            {status==='saving'&&'저장 중...'}
            {status==='ok'&&'구글 시트 연결됨'}
            {status==='error'&&'⚠ '+errMsg}
          </div>
        </div>
        <button onClick={load} style={{fontSize:12,background:'#fff',border:'1px solid #eee',borderRadius:8,padding:'6px 12px',color:'#666',fontWeight:500}}>새로고침</button>
      </div>
      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'1px solid #eee',marginBottom:24,background:'#fff',borderRadius:'12px 12px 0 0',overflow:'hidden',border:'1px solid #eee',borderBottom:'none'}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'13px 4px',border:'none',borderBottom:tab===t.id?'2px solid #111':'2px solid transparent',background:'transparent',color:tab===t.id?'#111':'#999',fontSize:13,fontWeight:tab===t.id?600:400,cursor:'pointer'}}>
            {t.label}
          </button>
        ))}
      </div>
      {status==='loading'?(
        <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:12,padding:'5rem 0',color:'#999',fontSize:14}}>
          <Spinner/> 구글 시트에서 불러오는 중...
        </div>
      ):(
        <>
          {tab==='home'&&<HomeTab members={members}/>}
          {tab==='txn'&&<TxnTab members={members} transactions={transactions} onUpdate={handleUpdate} saving={status==='saving'}/>}
          {tab==='history'&&<HistoryTab members={members} transactions={transactions} onUpdate={handleUpdate} saving={status==='saving'}/>}
          {tab==='members'&&<MembersTab members={members} transactions={transactions} onUpdate={handleUpdate} saving={status==='saving'}/>}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
