<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>연구실 장부</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;min-height:100vh}
input{width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:#111;outline:none}
input:focus{border-color:#888}
button{font-family:inherit;cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwPzshs-qmMlPCsBIIW6VLUyqgkD3F3nPI96hAm7QbXigVZueCVo4a2wZlXlCwikCg/exec';
const BASELINE = 50000;
const CACHE_KEY = 'lab-ledger-cache';
const fmt = n => new Intl.NumberFormat('ko-KR').format(Math.round(n));
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);

function parseSheet(data){
  const members=(data.members||[]).map(m=>({...m,balance:Number(m.balance)||0}));
  const transactions=(data.transactions||[]).map(t=>({
    ...t,
    amount:Number(t.amount)||0,
    amountPerPerson:Number(t.amountPerPerson)||0,
    sharedAmount:Number(t.sharedAmount)||0,
    memberIds:t.memberIds?String(t.memberIds).split(',').filter(Boolean):[],
    participants:(t.participants||[]).map(p=>({id:String(p.id),amount:Number(p.amount)})),
  }));
  return{members,transactions};
}

async function fetchFromSheet(){
  const r=await fetch(SCRIPT_URL);
  const data=await r.json();
  const result=parseSheet(data);
  try{localStorage.setItem(CACHE_KEY,JSON.stringify(result));}catch{}
  return result;
}

function loadCache(){
  try{const c=localStorage.getItem(CACHE_KEY);return c?JSON.parse(c):null;}catch{return null;}
}

async function saveData(members,transactions){
  try{localStorage.setItem(CACHE_KEY,JSON.stringify({members,transactions}));}catch{}
  await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'saveAll',members,transactions})});
}

function computeChanges(txn){
  switch(txn.type){
    case 'deposit':  return [{memberId:txn.memberId,delta:Number(txn.amount)}];
    case 'withdraw': return [{memberId:txn.memberId,delta:-Number(txn.amount)}];
    case 'transfer': return [{memberId:txn.fromMemberId,delta:-Number(txn.amount)},{memberId:txn.toMemberId,delta:+Number(txn.amount)}];
    case 'shared':{const ids=txn.memberIds||[];const per=Number(txn.amount)/ids.length;return ids.map(id=>({memberId:id,delta:-per}));}
    case 'delivery':{
      const parts=txn.participants||[];
      const sharedPer=parts.length>0?Number(txn.sharedAmount)/parts.length:0;
      const total=Number(txn.amount);
      const pid=txn.payerId&&txn.payerId!=='lab'?txn.payerId:null;
      return parts.map(p=>{const cost=Number(p.amount)+sharedPer;return{memberId:p.id,delta:-cost+(p.id===pid?total:0)};});
    }
    default:return[];
  }
}

// 멤버별 거래 이력 계산 (현재잔액에서 역산)
function getMemberHistory(memberId, transactions, currentBalance){
  const relevant = [];
  [...transactions].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(txn=>{
    const changes = computeChanges(txn);
    const c = changes.find(x=>x.memberId===memberId);
    if(c) relevant.push({txn, delta:c.delta});
  });
  // 현재잔액에서 역산으로 누적잔액 계산
  let bal = currentBalance;
  const result = [];
  for(let i=relevant.length-1;i>=0;i--){
    result.unshift({...relevant[i], balanceAfter:bal});
    bal -= relevant[i].delta;
  }
  return result;
}

function txnTypeLabel(txn, memberId){
  if(txn.type==='deposit') return '입금';
  if(txn.type==='withdraw') return '출금';
  if(txn.type==='transfer') return txn.fromMemberId===memberId?'송금(출)':'송금(입)';
  if(txn.type==='shared') return '공동지출';
  if(txn.type==='delivery') return '배달정산';
  return '기타';
}

function Spinner(){return <span style={{display:'inline-block',width:15,height:15,border:'2px solid #ddd',borderTopColor:'#555',borderRadius:'50%',animation:'spin .6s linear infinite'}}/>}

function Avatar({name,size=36}){
  const cols=[['#dbeafe','#1d4ed8'],['#dcfce7','#15803d'],['#fef3c7','#92400e'],['#fce7f3','#9d174d'],['#d1fae5','#065f46'],['#ede9fe','#5b21b6']];
  const [bg,fg]=cols[name.charCodeAt(0)%cols.length];
  return <div style={{width:size,height:size,borderRadius:'50%',background:bg,color:fg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.38,fontWeight:600,flexShrink:0}}>{name.slice(0,1)}</div>;
}

function Chip({active,onClick,children,disabled}){
  return <button onClick={onClick} disabled={disabled} style={{padding:'7px 15px',border:active?'2px solid #111':'1px solid #ddd',borderRadius:20,background:active?'#111':disabled?'#f5f5f5':'#fff',color:active?'#fff':disabled?'#bbb':'#111',fontSize:13,fontWeight:active?500:400,transition:'all .15s'}}>{children}</button>;
}
function SectionLabel({children}){return <div style={{fontSize:12,color:'#999',marginBottom:9,fontWeight:600,letterSpacing:.4}}>{children}</div>;}
function SaveButton({onClick,disabled,saving,done}){
  return(
    <button onClick={onClick} disabled={disabled||saving} style={{width:'100%',padding:'14px',border:'none',borderRadius:12,background:done?'#dcfce7':disabled||saving?'#f0f0f0':'#111',color:done?'#16a34a':disabled||saving?'#999':'#fff',fontSize:16,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8,transition:'all .2s'}}>
      {saving?<><Spinner/>&nbsp;저장 중...</>:done?'✓ 저장됨':'저장'}
    </button>
  );
}

function ConfirmDialog({message,detail,onConfirm,onCancel}){
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999,padding:'0 24px'}}>
      <div style={{background:'#fff',borderRadius:16,padding:'24px 20px',maxWidth:340,width:'100%'}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>정말 삭제할까요?</div>
        <div style={{fontSize:14,color:'#555',marginBottom:10}}>{message}</div>
        {detail&&<div style={{fontSize:12,color:'#dc2626',background:'#fff5f5',borderRadius:8,padding:'8px 10px',marginBottom:4}}>⚠ {detail}</div>}
        <div style={{display:'flex',gap:10,marginTop:18}}>
          <button onClick={onCancel} style={{flex:1,padding:'11px',border:'1px solid #ddd',borderRadius:10,background:'#fff',fontSize:14,fontWeight:500,color:'#555'}}>취소</button>
          <button onClick={onConfirm} style={{flex:1,padding:'11px',border:'none',borderRadius:10,background:'#dc2626',fontSize:14,fontWeight:600,color:'#fff'}}>삭제</button>
        </div>
      </div>
    </div>
  );
}

function MemberHistoryPanel({member, transactions}){
  const history = getMemberHistory(member.id, transactions, member.balance);
  if(history.length===0){
    return <div style={{padding:'16px 0 8px',textAlign:'center',color:'#bbb',fontSize:13}}>거래 내역이 없습니다</div>;
  }
  return(
    <div style={{animation:'slideDown .2s ease',marginTop:12}}>
      {/* 누적 잔액 미니 차트 */}
      {history.length>=2&&(()=>{
        const vals=history.map(h=>h.balanceAfter);
        const min=Math.min(...vals,0);
        const max=Math.max(...vals, BASELINE);
        const range=max-min||1;
        const W=100, H=40;
        const pts=vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-min)/range)*H}`).join(' ');
        const baseY=H-((0-min)/range)*H;
        const baselineY=H-((BASELINE-min)/range)*H;
        return(
          <div style={{marginBottom:12,padding:'10px 12px',background:'#f8f8f6',borderRadius:10,border:'1px solid #eee'}}>
            <div style={{fontSize:11,color:'#999',marginBottom:6,fontWeight:600}}>잔액 추이</div>
            <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:48,display:'block'}}>
              <line x1="0" y1={baselineY} x2={W} y2={baselineY} stroke="#fca5a5" strokeWidth="0.8" strokeDasharray="2,2"/>
              <polyline points={pts} fill="none" stroke="#6366f1" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
              {vals.map((v,i)=>(
                <circle key={i} cx={(i/(vals.length-1))*W} cy={H-((v-min)/range)*H} r="2" fill="#6366f1"/>
              ))}
            </svg>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#bbb',marginTop:2}}>
              <span>{new Date(history[0].txn.date).toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}</span>
              <span style={{color:'#fca5a5',fontSize:10}}>기준 {fmt(BASELINE)}원</span>
              <span>{new Date(history[history.length-1].txn.date).toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}</span>
            </div>
          </div>
        );
      })()}

      {/* 이력 목록 (최신순) */}
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {[...history].reverse().map(({txn,delta,balanceAfter},i)=>{
          const isPos=delta>=0;
          const date=new Date(txn.date).toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
          const typeLabel=txnTypeLabel(txn,member.id);
          return(
            <div key={txn.id+i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:10,background:'#fff',border:'1px solid #f0f0f0'}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:isPos?'#86efac':'#fca5a5',flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'baseline',gap:6}}>
                  <span style={{fontSize:12,color:'#999',flexShrink:0}}>{date}</span>
                  <span style={{fontSize:12,background:'#f5f5f5',color:'#666',padding:'1px 7px',borderRadius:6,flexShrink:0}}>{typeLabel}</span>
                  {txn.memo&&<span style={{fontSize:12,color:'#aaa',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{txn.memo}</span>}
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:700,color:isPos?'#16a34a':'#dc2626'}}>{isPos?'+':''}{fmt(delta)}원</div>
                <div style={{fontSize:11,color:'#bbb'}}>{fmt(balanceAfter)}원</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function HomeTab({members}){
  const below=members.filter(m=>m.balance<BASELINE);
  const total=members.reduce((s,m)=>s+m.balance,0);
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:24}}>
        <div style={{background:'#fff',borderRadius:12,padding:'16px 14px',border:'1px solid #eee'}}>
          <div style={{fontSize:11,color:'#999',marginBottom:6,fontWeight:600,letterSpacing:.5}}>전체 잔액</div>
          <div style={{fontSize:22,fontWeight:700}}>{fmt(total)}원</div>
        </div>
        <div style={{background:'#fff',borderRadius:12,padding:'16px 14px',border:'1px solid #eee'}}>
          <div style={{fontSize:11,color:'#999',marginBottom:6,fontWeight:600,letterSpacing:.5}}>기준 미달</div>
          <div style={{fontSize:22,fontWeight:700,color:below.length>0?'#dc2626':'#16a34a'}}>{below.length}명</div>
        </div>
      </div>
      <SectionLabel>개인별 잔액</SectionLabel>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {[...members].sort((a,b)=>a.balance-b.balance).map(m=>{
          const diff=m.balance-BASELINE;const low=diff<0;
          const pct=Math.min(100,Math.max(0,(m.balance/BASELINE)*100));
          return(
            <div key={m.id} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 14px',borderRadius:12,border:'1px solid #eee',background:'#fff'}}>
              <Avatar name={m.name}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                  <span style={{fontWeight:600,fontSize:14}}>{m.name}</span>
                  <span style={{fontSize:15,fontWeight:700,color:low?'#dc2626':'#111'}}>{fmt(m.balance)}원</span>
                </div>
                <div style={{height:5,borderRadius:3,background:'#f0f0f0',overflow:'hidden'}}>
                  <div style={{height:'100%',width:pct+'%',borderRadius:3,background:low?'#fca5a5':'#86efac',transition:'width .4s'}}/>
                </div>
                <div style={{fontSize:11,color:low?'#dc2626':'#999',marginTop:4}}>{low?`${fmt(-diff)}원 부족`:`기준 초과 +${fmt(diff)}원`}</div>
              </div>
            </div>
          );
        })}
      </div>
      {below.length>0&&(
        <div style={{marginTop:24}}>
          <SectionLabel>이번 달 정산 필요</SectionLabel>
          <div style={{borderRadius:12,border:'1px solid #fecaca',overflow:'hidden',background:'#fff'}}>
            {below.map((m,i)=>(
              <div key={m.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom:i<below.length-1?'1px solid #f5f5f5':'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}><Avatar name={m.name} size={28}/><span style={{fontSize:14,fontWeight:500}}>{m.name}</span></div>
                <span style={{fontSize:14,fontWeight:700,color:'#dc2626'}}>+{fmt(BASELINE-m.balance)}원</span>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{textAlign:'center',fontSize:11,color:'#bbb',marginTop:20}}>기준금액 {fmt(BASELINE)}원/월</div>
    </div>
  );
}

function DepositWithdrawForm({type,members,transactions,onUpdate,saving}){
  const [selId,setSelId]=useState('');const [amount,setAmount]=useState('');const [memo,setMemo]=useState('');const [done,setDone]=useState(false);
  const amtNum=parseInt(amount)||0;
  const handleSubmit=async()=>{
    if(!selId||amtNum<=0)return;
    const delta=type==='deposit'?amtNum:-amtNum;
    const newM=members.map(m=>m.id===selId?{...m,balance:m.balance+delta}:m);
    const txn={id:uid(),date:new Date().toISOString(),type,amount:amtNum,memo,memberId:selId,memberIds:[],amountPerPerson:0,fromMemberId:'',toMemberId:'',participants:[],payerId:'',sharedAmount:0};
    await onUpdate(newM,[txn,...transactions]);
    setAmount('');setMemo('');setSelId('');setDone(true);setTimeout(()=>setDone(false),2000);
  };
  return(
    <div>
      <div style={{marginBottom:18}}><SectionLabel>대상 멤버</SectionLabel><div style={{display:'flex',flexWrap:'wrap',gap:8}}>{members.map(m=><Chip key={m.id} active={selId===m.id} onClick={()=>setSelId(m.id)}>{m.name}</Chip>)}</div></div>
      <div style={{marginBottom:18}}>
        <SectionLabel>금액</SectionLabel>
        <div style={{position:'relative'}}>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0" min="0" style={{paddingRight:32,fontSize:20,fontWeight:600}}/>
          <span style={{position:'absolute',right:13,top:'50%',transform:'translateY(-50%)',color:'#999',fontSize:14,pointerEvents:'none'}}>원</span>
        </div>
      </div>
      <div style={{marginBottom:22}}><SectionLabel>메모 (선택)</SectionLabel><input type="text" value={memo} onChange={e=>setMemo(e.target.value)} placeholder=""/></div>
      <SaveButton onClick={handleSubmit} disabled={!selId||amtNum<=0} saving={saving} done={done}/>
    </div>
  );
}

function SharedForm({members,transactions,onUpdate,saving}){
  const [selMembers,setSelMembers]=useState([]);const [amount,setAmount]=useState('');const [memo,setMemo]=useState('');const [done,setDone]=useState(false);
  const toggleM=id=>setSelMembers(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const allSel=selMembers.length===members.length;
  const amtNum=parseInt(amount)||0;
  const ids=selMembers.length>0?selMembers:members.map(m=>m.id);
  const per=ids.length>0?amtNum/ids.length:0;
  const handleSubmit=async()=>{
    if(amtNum<=0)return;
    const newM=members.map(m=>ids.includes(m.id)?{...m,balance:m.balance-per}:m);
    const txn={id:uid(),date:new Date().toISOString(),type:'shared',amount:amtNum,memo,memberId:'',memberIds:ids,amountPerPerson:per,fromMemberId:'',toMemberId:'',participants:[],payerId:'',sharedAmount:0};
    await onUpdate(newM,[txn,...transactions]);
    setAmount('');setMemo('');setSelMembers([]);setDone(true);setTimeout(()=>setDone(false),2000);
  };
  return(
    <div>
      <div style={{marginBottom:18}}>
        <SectionLabel>참여 멤버 (미선택시 전체)</SectionLabel>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {members.map(m=><Chip key={m.id} active={selMembers.includes(m.id)} onClick={()=>toggleM(m.id)}>{m.name}</Chip>)}
          <button onClick={()=>setSelMembers(allSel?[]:members.map(m=>m.id))} style={{padding:'7px 15px',border:'1px solid #ddd',borderRadius:20,background:'#fff',color:'#999',fontSize:13}}>{allSel?'전체 해제':'전체'}</button>
        </div>
      </div>
      <div style={{marginBottom:18}}>
        <SectionLabel>금액</SectionLabel>
        <div style={{position:'relative'}}>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0" min="0" style={{paddingRight:32,fontSize:20,fontWeight:600}}/>
          <span style={{position:'absolute',right:13,top:'50%',transform:'translateY(-50%)',color:'#999',fontSize:14,pointerEvents:'none'}}>원</span>
        </div>
        {amtNum>0&&<div style={{fontSize:12,color:'#999',marginTop:5}}>1인당 {fmt(per)}원 ({ids.length}명)</div>}
      </div>
      <div style={{marginBottom:22}}><SectionLabel>메모 (선택)</SectionLabel><input type="text" value={memo} onChange={e=>setMemo(e.target.value)} placeholder="간식비, 행사비 등..."/></div>
      <SaveButton onClick={handleSubmit} disabled={amtNum<=0} saving={saving} done={done}/>
    </div>
  );
}

function TransferForm({members,transactions,onUpdate,saving}){
  const [fromId,setFromId]=useState('');const [toId,setToId]=useState('');const [amount,setAmount]=useState('');const [memo,setMemo]=useState('');const [done,setDone]=useState(false);
  const amtNum=parseInt(amount)||0;
  const fromName=members.find(m=>m.id===fromId)?.name;
  const toName=members.find(m=>m.id===toId)?.name;
  const handleSubmit=async()=>{
    if(!fromId||!toId||fromId===toId||amtNum<=0)return;
    const newM=members.map(m=>{if(m.id===fromId)return{...m,balance:m.balance-amtNum};if(m.id===toId)return{...m,balance:m.balance+amtNum};return m;});
    const txn={id:uid(),date:new Date().toISOString(),type:'transfer',amount:amtNum,memo,memberId:'',memberIds:[],amountPerPerson:0,fromMemberId:fromId,toMemberId:toId,participants:[],payerId:'',sharedAmount:0};
    await onUpdate(newM,[txn,...transactions]);
    setFromId('');setToId('');setAmount('');setMemo('');setDone(true);setTimeout(()=>setDone(false),2000);
  };
  return(
    <div>
      <div style={{marginBottom:18}}><SectionLabel>보내는 사람</SectionLabel><div style={{display:'flex',flexWrap:'wrap',gap:8}}>{members.map(m=><Chip key={m.id} active={fromId===m.id} onClick={()=>{setFromId(m.id);if(toId===m.id)setToId('');}}>{m.name}</Chip>)}</div></div>
      <div style={{marginBottom:18}}><SectionLabel>받는 사람</SectionLabel><div style={{display:'flex',flexWrap:'wrap',gap:8}}>{members.map(m=><Chip key={m.id} active={toId===m.id} disabled={m.id===fromId} onClick={()=>setToId(m.id)}>{m.name}</Chip>)}</div></div>
      <div style={{marginBottom:18}}>
        <SectionLabel>금액</SectionLabel>
        <div style={{position:'relative'}}>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0" min="0" style={{paddingRight:32,fontSize:20,fontWeight:600}}/>
          <span style={{position:'absolute',right:13,top:'50%',transform:'translateY(-50%)',color:'#999',fontSize:14,pointerEvents:'none'}}>원</span>
        </div>
        {fromName&&toName&&amtNum>0&&(
          <div style={{fontSize:12,color:'#999',marginTop:5,display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontWeight:600,color:'#dc2626'}}>{fromName}</span><span>→</span><span style={{fontWeight:600,color:'#16a34a'}}>{toName}</span><span>{fmt(amtNum)}원</span>
          </div>
        )}
      </div>
      <div style={{marginBottom:22}}><SectionLabel>메모 (선택)</SectionLabel><input type="text" value={memo} onChange={e=>setMemo(e.target.value)} placeholder=""/></div>
      <SaveButton onClick={handleSubmit} disabled={!fromId||!toId||amtNum<=0} saving={saving} done={done}/>
    </div>
  );
}

function DeliveryForm({members,transactions,onUpdate,saving}){
  const [selMembers,setSelMembers]=useState([]);const [amounts,setAmounts]=useState({});const [sharedAmt,setSharedAmt]=useState('');const [payerId,setPayerId]=useState('lab');const [memo,setMemo]=useState('');const [done,setDone]=useState(false);
  const toggleM=id=>{
    setSelMembers(p=>{
      if(p.includes(id)){const next=p.filter(x=>x!==id);setAmounts(a=>{const n={...a};delete n[id];return n;});if(payerId===id)setPayerId('lab');return next;}
      return[...p,id];
    });
  };
  const sharedNum=parseInt(sharedAmt)||0;
  const sharedPer=selMembers.length>0?sharedNum/selMembers.length:0;
  const indivTotal=selMembers.reduce((s,id)=>s+(parseInt(amounts[id])||0),0);
  const total=indivTotal+sharedNum;
  const preview=selMembers.map(id=>{const cost=(parseInt(amounts[id])||0)+sharedPer;const isPayer=id===payerId;return{id,cost,delta:-cost+(isPayer?total:0),isPayer};});
  const handleSubmit=async()=>{
    if(selMembers.length===0||total===0)return;
    const participants=selMembers.map(id=>({id,amount:parseInt(amounts[id])||0}));
    const changes=preview.map(p=>({memberId:p.id,delta:p.delta}));
    const newM=members.map(m=>{const c=changes.find(x=>x.memberId===m.id);return c?{...m,balance:m.balance+c.delta}:m;});
    const txn={id:uid(),date:new Date().toISOString(),type:'delivery',amount:total,memo,memberId:'',memberIds:[],amountPerPerson:0,fromMemberId:'',toMemberId:'',participants,payerId,sharedAmount:sharedNum};
    await onUpdate(newM,[txn,...transactions]);
    setSelMembers([]);setAmounts({});setSharedAmt('');setPayerId('lab');setMemo('');setDone(true);setTimeout(()=>setDone(false),2000);
  };
  return(
    <div>
      <div style={{marginBottom:18}}><SectionLabel>참여 멤버</SectionLabel><div style={{display:'flex',flexWrap:'wrap',gap:8}}>{members.map(m=><Chip key={m.id} active={selMembers.includes(m.id)} onClick={()=>toggleM(m.id)}>{m.name}</Chip>)}</div></div>
      {selMembers.length>0&&(
        <div style={{marginBottom:18}}>
          <SectionLabel>개인 금액</SectionLabel>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {selMembers.map(id=>{const m=members.find(x=>x.id===id);return(
              <div key={id} style={{display:'flex',alignItems:'center',gap:10}}>
                <Avatar name={m.name} size={30}/>
                <span style={{fontSize:14,fontWeight:600,width:56,flexShrink:0}}>{m.name}</span>
                <div style={{flex:1,position:'relative'}}>
                  <input type="number" value={amounts[id]||''} onChange={e=>setAmounts(p=>({...p,[id]:e.target.value}))} placeholder="0" min="0" style={{paddingRight:30}}/>
                  <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:12,color:'#999',pointerEvents:'none'}}>원</span>
                </div>
              </div>
            );})}
          </div>
        </div>
      )}
      <div style={{marginBottom:18}}>
        <SectionLabel>공동 금액 (배달팁, 공동메뉴 등 — 균등 분배)</SectionLabel>
        <div style={{position:'relative'}}>
          <input type="number" value={sharedAmt} onChange={e=>setSharedAmt(e.target.value)} placeholder="0" min="0" style={{paddingRight:30}}/>
          <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:12,color:'#999',pointerEvents:'none'}}>원</span>
        </div>
        {selMembers.length>0&&sharedNum>0&&<div style={{fontSize:12,color:'#999',marginTop:4}}>1인당 +{fmt(sharedPer)}원</div>}
      </div>
      <div style={{marginBottom:18}}>
        <SectionLabel>결제자</SectionLabel>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          <Chip active={payerId==='lab'} onClick={()=>setPayerId('lab')}>랩비카드</Chip>
          {selMembers.map(id=>{const m=members.find(x=>x.id===id);return <Chip key={id} active={payerId===id} onClick={()=>setPayerId(id)}>{m?.name}</Chip>;})}
        </div>
      </div>
      <div style={{marginBottom:18}}><SectionLabel>메모 (선택)</SectionLabel><input type="text" value={memo} onChange={e=>setMemo(e.target.value)} placeholder="치킨, 피자, 중국집 등..."/></div>
      {selMembers.length>0&&total>0&&(
        <div style={{marginBottom:18,padding:14,background:'#f8f8f6',borderRadius:12,border:'1px solid #eee'}}>
          <div style={{fontSize:12,color:'#999',marginBottom:10,fontWeight:600,letterSpacing:.4}}>정산 미리보기</div>
          {preview.map(p=>{const m=members.find(x=>x.id===p.id);return(
            <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <Avatar name={m.name} size={24}/>
                <span style={{fontSize:13,fontWeight:500}}>{m.name}</span>
                {p.isPayer&&payerId!=='lab'&&<span style={{fontSize:10,background:'#ede9fe',color:'#5b21b6',padding:'2px 7px',borderRadius:10,fontWeight:600}}>결제자</span>}
              </div>
              <div style={{textAlign:'right'}}>
                <span style={{fontSize:14,fontWeight:700,color:p.delta>=0?'#16a34a':'#dc2626'}}>{p.delta>=0?'+':''}{fmt(p.delta)}원</span>
                {p.isPayer&&payerId!=='lab'&&<div style={{fontSize:10,color:'#999'}}>부담 {fmt(p.cost)}원</div>}
              </div>
            </div>
          );})}
          <div style={{borderTop:'1px solid #eee',marginTop:8,paddingTop:8,display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:12,color:'#999'}}>합계</span>
            <span style={{fontSize:14,fontWeight:700}}>{fmt(total)}원</span>
          </div>
        </div>
      )}
      <SaveButton onClick={handleSubmit} disabled={selMembers.length===0||total===0} saving={saving} done={done}/>
    </div>
  );
}

function TxnTab({members,transactions,onUpdate,saving}){
  const [type,setType]=useState('delivery');
  const types=[{id:'deposit',label:'입금'},{id:'withdraw',label:'출금'},{id:'shared',label:'공동지출'},{id:'transfer',label:'송금'},{id:'delivery',label:'배달정산'}];
  return(
    <div>
      <div style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
        {types.map(t=><Chip key={t.id} active={type===t.id} onClick={()=>setType(t.id)}>{t.label}</Chip>)}
      </div>
      {(type==='deposit'||type==='withdraw')&&<DepositWithdrawForm type={type} members={members} transactions={transactions} onUpdate={onUpdate} saving={saving}/>}
      {type==='shared'&&<SharedForm members={members} transactions={transactions} onUpdate={onUpdate} saving={saving}/>}
      {type==='transfer'&&<TransferForm members={members} transactions={transactions} onUpdate={onUpdate} saving={saving}/>}
      {type==='delivery'&&<DeliveryForm members={members} transactions={transactions} onUpdate={onUpdate} saving={saving}/>}
    </div>
  );
}

function DeliveryDetail({txn,byId}){
  const sharedPer=(txn.participants||[]).length>0?Number(txn.sharedAmount)/(txn.participants||[]).length:0;
  const payerName=txn.payerId&&txn.payerId!=='lab'?(byId[txn.payerId]?.name||'?'):'랩비카드';
  return(
    <div style={{marginTop:10,padding:'12px 14px',background:'#f8f8f6',borderRadius:10,border:'1px solid #eee'}}>
      {(txn.participants||[]).map(p=>{
        const m=byId[p.id];if(!m)return null;
        const indiv=Number(p.amount);const total=indiv+sharedPer;const isPayer=p.id===txn.payerId;
        return(
          <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <Avatar name={m.name} size={26}/>
            <span style={{fontSize:13,fontWeight:600,flex:1}}>{m.name}{isPayer&&<span style={{marginLeft:6,fontSize:10,background:'#ede9fe',color:'#5b21b6',padding:'2px 6px',borderRadius:8,fontWeight:600}}>결제자</span>}</span>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:13,fontWeight:600}}>{fmt(indiv)}원</div>
              {sharedPer>0&&<div style={{fontSize:11,color:'#999'}}>+공동 {fmt(sharedPer)}원 = {fmt(total)}원</div>}
            </div>
          </div>
        );
      })}
      <div style={{borderTop:'1px solid #e5e5e5',marginTop:6,paddingTop:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:11,color:'#999'}}>결제: {payerName} · 공동금액: {fmt(txn.sharedAmount||0)}원</span>
        <span style={{fontSize:13,fontWeight:700}}>합계 {fmt(txn.amount)}원</span>
      </div>
    </div>
  );
}

function HistoryTab({members,transactions,onUpdate,saving}){
  const byId=members.reduce((a,m)=>({...a,[m.id]:m}),{});
  const [filter,setFilter]=useState('all');
  const [expandedId,setExpandedId]=useState(null);
  const [confirmId,setConfirmId]=useState(null);
  const getInfo=txn=>{
    if(txn.type==='deposit') return{label:(byId[txn.memberId]?.name||'?')+' 입금',icon:'+',bg:'#dcfce7',tc:'#16a34a',amt:'+'+fmt(txn.amount)+'원'};
    if(txn.type==='withdraw') return{label:(byId[txn.memberId]?.name||'?')+' 출금',icon:'−',bg:'#fee2e2',tc:'#dc2626',amt:'−'+fmt(txn.amount)+'원'};
    if(txn.type==='transfer'){const f=byId[txn.fromMemberId]?.name||'?';const t=byId[txn.toMemberId]?.name||'?';return{label:`${f} → ${t}`,icon:'↔',bg:'#ede9fe',tc:'#5b21b6',amt:fmt(txn.amount)+'원'};}
    if(txn.type==='shared'){const names=(txn.memberIds||[]).map(id=>byId[id]?.name).filter(Boolean);return{label:`공동지출 · ${names.join(', ')}`,icon:'÷',bg:'#dbeafe',tc:'#dc2626',amt:'−'+fmt(txn.amount)+'원'};}
    if(txn.type==='delivery'){const names=(txn.participants||[]).map(p=>byId[p.id]?.name).filter(Boolean);return{label:`배달정산 · ${names.join(', ')}`,icon:'🛵',bg:'#fef3c7',tc:'#92400e',amt:fmt(txn.amount)+'원'};}
    return{label:'기타',icon:'·',bg:'#f5f5f5',tc:'#555',amt:fmt(txn.amount)+'원'};
  };
  const handleDeleteConfirmed=async()=>{
    const txn=transactions.find(t=>t.id===confirmId);setConfirmId(null);if(!txn)return;
    const changes=computeChanges(txn);
    const newM=members.map(m=>{const c=changes.find(x=>x.memberId===m.id);return c?{...m,balance:m.balance-c.delta}:m;});
    await onUpdate(newM,transactions.filter(t=>t.id!==txn.id));
  };
  const filtered=filter==='all'?transactions:transactions.filter(t=>t.type===filter);
  const confirmTxn=transactions.find(t=>t.id===confirmId);
  const confirmInfo=confirmTxn?getInfo(confirmTxn):null;
  return(
    <div>
      {confirmId&&<ConfirmDialog message={(confirmInfo?.label)+(confirmTxn?.memo?' ('+confirmTxn.memo+')':'')+' · '+confirmInfo?.amt} detail="삭제하면 잔액이 복구되지만 거래 기록은 영구적으로 사라져요." onConfirm={handleDeleteConfirmed} onCancel={()=>setConfirmId(null)}/>}
      <div style={{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap'}}>
        {[['all','전체'],['deposit','입금'],['withdraw','출금'],['transfer','송금'],['shared','공동'],['delivery','배달']].map(([v,l])=>(
          <Chip key={v} active={filter===v} onClick={()=>setFilter(v)}>{l}</Chip>
        ))}
      </div>
      {filtered.length===0?(
        <div style={{textAlign:'center',color:'#bbb',padding:'4rem 0',fontSize:15}}>거래 내역이 없습니다</div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {filtered.map(txn=>{
            const{label,icon,bg,tc,amt}=getInfo(txn);
            const date=new Date(txn.date).toLocaleDateString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
            const isDelivery=txn.type==='delivery';const expanded=expandedId===txn.id;
            return(
              <div key={txn.id} style={{borderRadius:12,border:'1px solid #eee',background:'#fff',overflow:'hidden'}}>
                <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px'}}>
                  <div style={{width:36,height:36,borderRadius:10,background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0,color:tc,fontWeight:700}}>{icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{txn.memo||label}</div>
                    <div style={{fontSize:11,color:'#999',marginTop:2}}>{txn.memo?label+' · ':''}{date}</div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0,marginRight:4}}>
                    <div style={{fontSize:14,fontWeight:700,color:tc}}>{amt}</div>
                    {txn.type==='shared'&&(txn.memberIds||[]).length>1&&<div style={{fontSize:11,color:'#999'}}>{fmt(txn.amountPerPerson)}원/인</div>}
                    {isDelivery&&<div style={{fontSize:11,color:'#999'}}>{(txn.participants||[]).length}명</div>}
                  </div>
                  {isDelivery&&<button onClick={()=>setExpandedId(expanded?null:txn.id)} style={{background:'transparent',border:'1px solid #eee',borderRadius:8,color:'#666',fontSize:12,padding:'4px 8px',flexShrink:0,fontWeight:500,whiteSpace:'nowrap'}}>{expanded?'접기':'자세히'}</button>}
                  <button onClick={()=>setConfirmId(txn.id)} disabled={saving} style={{background:'transparent',border:'none',color:'#ccc',fontSize:20,padding:'2px 4px',lineHeight:1,flexShrink:0}}>×</button>
                </div>
                {isDelivery&&expanded&&<div style={{padding:'0 14px 14px'}}><DeliveryDetail txn={txn} byId={byId}/></div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function MembersTab({members,transactions,onUpdate,saving}){
  const [name,setName]=useState('');const [bal,setBal]=useState('50000');const [editId,setEditId]=useState(null);const [editBal,setEditBal]=useState('');
  const [confirmId,setConfirmId]=useState(null);
  const [expandedId,setExpandedId]=useState(null);

  const add=async()=>{if(!name.trim())return;await onUpdate([...members,{id:uid(),name:name.trim(),balance:parseInt(bal)||0}],transactions);setName('');setBal('50000');};
  const remove=async id=>{await onUpdate(members.filter(m=>m.id!==id),transactions);setConfirmId(null);};
  const saveEdit=async id=>{await onUpdate(members.map(m=>m.id===id?{...m,balance:parseInt(editBal)||0}:m),transactions);setEditId(null);};
  const confirmMember=members.find(m=>m.id===confirmId);

  return(
    <div>
      {confirmId&&<ConfirmDialog message={`${confirmMember?.name} 멤버를 삭제할까요?`} detail="멤버 삭제는 되돌릴 수 없어요. 기존 거래 내역의 이름 표시에 영향을 줄 수 있어요." onConfirm={()=>remove(confirmId)} onCancel={()=>setConfirmId(null)}/>}
      <div style={{marginBottom:22,padding:16,border:'1px solid #eee',borderRadius:12,background:'#fff'}}>
        <SectionLabel>멤버 추가</SectionLabel>
        <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="이름" style={{marginBottom:10}} onKeyDown={e=>e.key==='Enter'&&add()}/>
        <input type="number" value={bal} onChange={e=>setBal(e.target.value)} placeholder="초기 잔액" style={{marginBottom:14}}/>
        <button onClick={add} disabled={saving} style={{width:'100%',padding:'11px',border:'none',borderRadius:10,background:'#111',color:'#fff',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          {saving?<><Spinner/>&nbsp;저장 중...</>:'추가'}
        </button>
      </div>
      <SectionLabel>멤버 목록 ({members.length}명) · 카드를 눌러 이력 확인</SectionLabel>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {members.map(m=>{
          const expanded=expandedId===m.id;
          return(
            <div key={m.id} style={{borderRadius:12,border:'1px solid #eee',background:'#fff',overflow:'hidden'}}>
              {/* 멤버 카드 헤더 — 클릭하면 이력 토글 */}
              <div style={{display:'flex',alignItems:'center',gap:12,padding:'13px 14px',cursor:'pointer'}} onClick={()=>setExpandedId(expanded?null:m.id)}>
                <Avatar name={m.name}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14}}>{m.name}</div>
                  {editId===m.id?(
                    <div style={{display:'flex',gap:6,marginTop:6}} onClick={e=>e.stopPropagation()}>
                      <input type="number" value={editBal} onChange={e=>setEditBal(e.target.value)} style={{fontSize:13,padding:'5px 9px',width:120}}/>
                      <button onClick={()=>saveEdit(m.id)} style={{padding:'5px 11px',border:'1px solid #ddd',borderRadius:7,background:'#fff',fontSize:12,fontWeight:500}}>저장</button>
                      <button onClick={()=>setEditId(null)} style={{padding:'5px 8px',border:'none',background:'transparent',fontSize:12,color:'#999'}}>취소</button>
                    </div>
                  ):(
                    <div style={{fontSize:13,color:'#999',marginTop:2}}>{fmt(m.balance)}원</div>
                  )}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                  <button onClick={e=>{e.stopPropagation();setEditId(editId===m.id?null:m.id);setEditBal(String(m.balance));}} style={{padding:'4px 9px',border:'1px solid #eee',borderRadius:7,background:'#fff',fontSize:12,color:'#888'}}>수정</button>
                  <button onClick={e=>{e.stopPropagation();setConfirmId(m.id);}} disabled={saving} style={{padding:'4px 9px',border:'1px solid #fee2e2',borderRadius:7,background:'#fff',color:'#dc2626',fontSize:12}}>삭제</button>
                  <span style={{fontSize:12,color:'#bbb',marginLeft:2}}>{expanded?'▲':'▼'}</span>
                </div>
              </div>
              {/* 이력 패널 */}
              {expanded&&(
                <div style={{borderTop:'1px solid #f5f5f5',padding:'0 14px 14px'}}>
                  <MemberHistoryPanel member={m} transactions={transactions}/>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App(){
  const [members,setMembers]=useState([]);
  const [transactions,setTxns]=useState([]);
  const [tab,setTab]=useState('home');
  const [status,setStatus]=useState('loading');
  const [errMsg,setErrMsg]=useState('');
  const applyData=({members:m,transactions:t})=>{setMembers(m);setTxns(t);};
  const load=useCallback(async()=>{
    const cached=loadCache();
    if(cached){applyData(cached);setStatus('ok');}else{setStatus('loading');}
    try{const fresh=await fetchFromSheet();applyData(fresh);setStatus('ok');}
    catch(e){if(!cached){setStatus('error');setErrMsg(e.message||'연결 실패');}}
  },[]);
  useEffect(()=>{load();},[load]);
  const handleUpdate=useCallback(async(newM,newT)=>{
    setMembers(newM);setTxns(newT);setStatus('saving');
    try{await saveData(newM,newT);setStatus('ok');}
    catch{setStatus('error');setErrMsg('저장 실패 — 새로고침 후 재시도');}
  },[]);
  const tabs=[{id:'home',label:'잔액현황'},{id:'txn',label:'거래입력'},{id:'history',label:'거래내역'},{id:'members',label:'멤버관리'}];
  return(
    <div style={{maxWidth:540,margin:'0 auto',padding:'0 16px 80px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 0 4px'}}>
        <div>
          <div style={{fontSize:20,fontWeight:700}}>연구실 장부</div>
          <div style={{fontSize:11,marginTop:2,color:status==='error'?'#dc2626':status==='saving'?'#f59e0b':'#bbb'}}>
            {status==='loading'&&'불러오는 중...'}{status==='saving'&&'저장 중...'}{status==='ok'&&'구글 시트 연결됨'}{status==='error'&&'⚠ '+errMsg}
          </div>
        </div>
        <button onClick={load} style={{fontSize:12,background:'#fff',border:'1px solid #eee',borderRadius:8,padding:'6px 12px',color:'#666',fontWeight:500}}>새로고침</button>
      </div>
      <div style={{display:'flex',borderBottom:'1px solid #eee',marginBottom:24,marginTop:16}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'12px 4px',border:'none',borderBottom:tab===t.id?'2px solid #111':'2px solid transparent',background:'transparent',color:tab===t.id?'#111':'#999',fontSize:13,fontWeight:tab===t.id?600:400,cursor:'pointer'}}>{t.label}</button>
        ))}
      </div>
      {status==='loading'&&!loadCache()?(
        <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:12,padding:'5rem 0',color:'#999',fontSize:14}}><Spinner/> 구글 시트에서 불러오는 중...</div>
      ):(
        <>
          {tab==='home'&&<HomeTab members={members}/>}
          {tab==='txn'&&<TxnTab members={members} transactions={transactions} onUpdate={handleUpdate} saving={status==='saving'}/>}
          {tab==='history'&&<HistoryTab members={members} transactions={transactions} onUpdate={handleUpdate} saving={status==='saving'}/>}
          {tab==='members'&&<MembersTab members={members} transactions={transactions} onUpdate={handleUpdate} saving={status==='saving'}/>}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
